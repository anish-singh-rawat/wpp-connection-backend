# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse-proxy config for WhatsApp API + Socket.IO
#
# Deploy:
#   sudo cp nginx/whatsapp-api.conf /etc/nginx/sites-available/whatsapp-api
#   sudo ln -sf /etc/nginx/sites-available/whatsapp-api /etc/nginx/sites-enabled/whatsapp-api
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

# ── Backend API (digiwppconnect-backend.digibysr.in) ─────────────────────────
server {
    listen 80;
    server_name digiwppconnect-backend.digibysr.in;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name digiwppconnect-backend.digibysr.in;

    ssl_certificate     /etc/letsencrypt/live/digiwppconnect-backend.digibysr.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/digiwppconnect-backend.digibysr.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Upload size for media files — must be >= multer limit (16MB) + multipart overhead
    client_max_body_size 20M;

    # ── Socket.IO — MUST come before the generic location / ──────────────────
    # Socket.IO uses /socket.io/ path for both polling and WebSocket upgrade.
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:8086;
        proxy_http_version 1.1;

        # These two headers are REQUIRED for WebSocket upgrade
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeouts — WebSocket connections are long-lived
        proxy_connect_timeout  7d;
        proxy_send_timeout     7d;
        proxy_read_timeout     7d;

        # Disable buffering for real-time events (SSE + WebSocket)
        proxy_buffering    off;
        proxy_cache        off;
    }

    # ── REST API + SSE ────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8086;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';

        proxy_connect_timeout  60s;
        proxy_send_timeout     300s;
        proxy_read_timeout     300s;

        # Required for SSE (Server-Sent Events) — disable buffering
        proxy_buffering    off;
        proxy_cache        off;

        client_max_body_size 20M;
    }
}


# ── Frontend (digiwppconnect-frontend.digibysr.in) ────────────────────────────
server {
    listen 80;
    server_name digiwppconnect-frontend.digibysr.in;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name digiwppconnect-frontend.digibysr.in;

    ssl_certificate     /etc/letsencrypt/live/digiwppconnect-frontend.digibysr.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/digiwppconnect-frontend.digibysr.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Serve the built Vite/React app
    root /var/www/wpp-connection-frontend/dist;
    index index.html;

    location / {
        # SPA fallback — all routes serve index.html
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
