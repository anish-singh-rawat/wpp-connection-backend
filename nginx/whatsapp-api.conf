# Nginx reverse proxy config for WhatsApp API
# Place at: /etc/nginx/sites-available/whatsapp-api
# Then: sudo ln -s /etc/nginx/sites-available/whatsapp-api /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-domain.com;   # <-- replace with your domain or server IP

    # Redirect HTTP → HTTPS (uncomment after SSL setup)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';

        # Timeouts for long bulk-send operations
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Upload size for CSV files
        client_max_body_size   5M;
    }
}

